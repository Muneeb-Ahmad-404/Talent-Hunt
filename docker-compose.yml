services:
  postgres:
    image: postgres:16             
    environment:
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: localdevpw
      POSTGRES_DB: talenthunt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data   
    healthcheck:                          
      test: ["CMD-SHELL", "pg_isready -U talent"] #check for if service is up
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:        